# Stem Estimation Workflow Configuration
# Edit paths for your local data layout.

input:
  naip_dir: "./data/naip"      # 4-band NAIP GeoTIFFs
  las_dir: "./data/las"        # 3DEP .las / .laz
  dem_dir: "./data/dem"        # 1 m DEM GeoTIFFs (pixel-grid anchor)

output:
  out_dir: "./output"
  format: "vector"             # vector | raster | both
  tile_size_m: 100             # chip size in meters (1 m pixels → 100 px)
  basename: "stem_predictions"

models:
  discriminator: "models/discriminator.keras"
  low_expert: "models/low_expert.keras"
  base_expert: "models/base_expert.keras"
  high_expert: "models/high_expert.keras"
  metadata: "models/model_metadata.json"

preprocessing:
  resolution_m: 1.0
  height_bins_m:
    - [1.0, 2.0]
    - [2.0, 3.0]
    - [3.0, 4.0]
  fill_intensity_gaps: true
  normalize:
    chm: [0, 118]              # feet above ground
    intensity: [0, 43000]      # LAS mean intensity (16-bit)
    h1_2: [0, 100]
    h2_3: [0, 100]
    h3_4: [0, 100]
    min_valid_fraction: 0.5
  tile_size: 100

inference:
  batch_size: 16
  use_gpu: true

logging:
  level: "INFO"
  log_file: "processing_log.txt"