# Stem Estimation Workflow Configuration
# Edit these values or override via command-line / Python API

input:
  naip_dir: "C:/Users/christopher.ardohain/OneDrive/Chris_Work/Purdue/stem_estimation/data/naip"
  las_dir: "C:/Users/christopher.ardohain/OneDrive/Chris_Work/Purdue/stem_estimation/data/las"
  dem_dir: "C:/Users/christopher.ardohain/OneDrive/Chris_Work/Purdue/stem_estimation/data/dem_tif"

output:
  out_dir: "C:/Users/christopher.ardohain/OneDrive/Chris_Work/Purdue/stem_estimation/data/preprocessed/test_01"
  format: "raster"          # for this test we only want the stacked raster
  tile_size_m: 100
  basename: "test_stack"

models:
  # === PLACEHOLDERS ===
  # Download the actual .keras files from the release and place them here (or update paths).
  # See models/README.md and the main README for hosting details (GitHub Releases recommended).
  discriminator: "models/discriminator.keras"
  low_expert:    "models/low_expert.keras"
  base_expert:   "models/base_expert.keras"
  high_expert:   "models/high_expert.keras"

  # Optional: path to a JSON file with model metadata (input shape, class mapping, etc.)
  metadata: "models/model_metadata.json"

preprocessing:
  resolution_m: 1.0
  height_bins_m:
    - [1.0, 2.0]
    - [2.0, 3.0]
    - [3.0, 4.0]
  fill_intensity_gaps: true
  normalize:
    chm: [0, 118]          # feet above ground
    intensity: [0, 43000]   # LAS mean intensity (16-bit)
    h1_2: [0, 100]
    h2_3: [0, 100]
    h3_4: [0, 100]
    min_valid_fraction: 0.5
  tile_size: 100            # default; overridable

inference:
  # Batch size for model inference (adjust based on GPU memory)
  batch_size: 16

  # Use GPU if available (set to false to force CPU)
  use_gpu: true

logging:
  level: "INFO"   # DEBUG, INFO, WARNING, ERROR
  log_file: "processing_log.txt"